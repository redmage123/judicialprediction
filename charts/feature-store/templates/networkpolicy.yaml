{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "feature-store.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "feature-store.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "feature-store.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Only api-gateway pods are permitted to call the feature-store on the gRPC port.
    # Sprint 2: tighten to also restrict by namespace once per-tenant namespacing is in place.
    - from:
        - podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.apiGatewaySelector.matchLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}

  egress:
    # Allow DNS resolution (kube-dns / CoreDNS).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow outbound to Postgres (CloudNativePG pod in the same namespace in prod;
    # or the docker-compose dev Postgres via NodePort/ExternalName).
    # Sprint 2: tighten to the exact CloudNativePG pod label.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: judicialpredict-postgres
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
