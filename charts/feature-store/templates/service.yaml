apiVersion: v1
kind: Service
metadata:
  name: {{ include "feature-store.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "feature-store.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      # Named "grpc" so Istio and other service-mesh tools can detect the protocol.
      name: grpc
  selector:
    {{- include "feature-store.selectorLabels" . | nindent 4 }}
