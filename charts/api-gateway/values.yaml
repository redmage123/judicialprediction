# Default values for api-gateway.
# Override per-environment in gitops/<env>/values/api-gateway.yaml.

replicaCount: 2

image:
  repository: ghcr.io/openclaw/jp-api-gateway
  pullPolicy: IfNotPresent
  tag: "dev"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Whether to create a ServiceAccount for the pod.
  create: true
  # Annotations to add to the ServiceAccount.
  annotations: {}
  # Name override — defaults to the chart fullname.
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "4000"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 4000
  targetPort: 4000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Liveness and readiness probe configuration.
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}

# Environment variables. DATABASE_URL is injected from a Kubernetes Secret.
env:
  # The Kubernetes Secret name that holds DATABASE_URL.
  databaseSecretName: "api-gateway-db-credentials"
  databaseSecretKey: "DATABASE_URL"

  # Additional env vars as plain key/value pairs.
  extra: []
  # - name: RUST_LOG
  #   value: "info"

# NetworkPolicy configuration (Sprint 2: tighten egress labels).
networkPolicy:
  enabled: true
  # Namespaces whose pods are permitted to reach the api-gateway.
  tenantNamespaceSelector:
    matchLabels:
      judicialpredict/role: tenant-facing
