# =============================================================================
# JudicialPredict — LOCAL DEV STACK ONLY
#
# This file is for local development and CI integration tests ONLY.
# Production uses managed operators per ADR-003 and spec §11.5:
#   - Postgres  → CloudNativePG operator (K8s)
#   - Neo4j     → Neo4j Helm chart (K8s)
#   - Redis     → Redis Operator / Upstash (K8s / managed)
#   - MinIO     → MinIO Operator (K8s) / S3-compatible cloud bucket
#
# Never point production credentials at this compose file.
# Never commit real secrets to this file.
# =============================================================================

name: judicialpredict-dev

services:

  # ---------------------------------------------------------------------------
  # Postgres 16 + pgvector
  # Production equivalent: CloudNativePG cluster (ADR-003)
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: judicialpredict_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: judicialpredict
      POSTGRES_PASSWORD: judicialpredict_dev_pwd
      POSTGRES_DB: judicialpredict_dev
    ports:
      - "127.0.0.1:5454:5432"
    volumes:
      - jp_pg_data:/var/lib/postgresql/data
    networks:
      - jp_dev_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judicialpredict -d judicialpredict_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Neo4j 5 Community Edition
  # Production equivalent: Neo4j Helm chart (ADR-003)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: judicialpredict_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/judicialpredict_dev_pwd
      # Allow up to 2 GB heap for local graph queries.
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2g
    ports:
      - "127.0.0.1:7474:7474"  # HTTP / browser
      - "127.0.0.1:7687:7687"  # Bolt
    volumes:
      - jp_neo4j_data:/data
      - jp_neo4j_logs:/logs
    networks:
      - jp_dev_net
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          cypher-shell -u neo4j -p judicialpredict_dev_pwd \
            'RETURN 1' --format plain 2>/dev/null | grep -q '1'
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 with persistence + Streams
  # Production equivalent: Redis Operator / Upstash (ADR-003)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: judicialpredict_redis
    restart: unless-stopped
    # AOF + RDB persistence; Streams are a native Redis 5+ data type.
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --save 300 10
    ports:
      - "127.0.0.1:6385:6379"
    volumes:
      - jp_redis_data:/data
    networks:
      - jp_dev_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object store)
  # Production equivalent: MinIO Operator / S3-compatible cloud bucket (ADR-003)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: judicialpredict_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: judicialpredict
      MINIO_ROOT_PASSWORD: judicialpredict_dev_pwd
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9100:9000"   # S3 API
      - "127.0.0.1:9101:9001"   # Web console
    volumes:
      - jp_minio_data:/data
    networks:
      - jp_dev_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Django admin console (S2.15 / JP-39)
  # Production equivalent: Kubernetes Deployment (Sprint-3)
  #
  # Usage:
  #   docker compose -f docker-compose.dev.yml up admin
  #
  # Reach the admin at http://localhost:8000/admin/
  # Create a superuser:
  #   docker compose -f docker-compose.dev.yml exec admin \
  #     python manage.py createsuperuser
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: python/admin
      dockerfile: Dockerfile
    container_name: judicialpredict_admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Connect as the Postgres superuser so the admin can see all tenants
      # (bypasses RLS). Sprint-3: switch to jp_admin role with BYPASSRLS.
      ADMIN_DATABASE_URL: >-
        postgres://judicialpredict:judicialpredict_dev_pwd@postgres:5432/judicialpredict_dev
      DJANGO_SECRET_KEY: dev-only-insecure-key-CHANGE-BEFORE-PRODUCTION-0000000000000000000
      DEBUG: "true"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,admin"
      STATIC_ROOT: /static
    ports:
      - "127.0.0.1:8090:8000"   # host 8000 is occupied by course-creator
    volumes:
      - jp_admin_static:/static
    networks:
      - jp_dev_net
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy 2>/dev/null || python manage.py check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


  # ---------------------------------------------------------------------------
  # api-gateway (Rust async-graphql + axum)
  # Production equivalent: Kubernetes Deployment + HPA
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: .                                # monorepo root: rust/ + protos/
      dockerfile: rust/api-gateway/Dockerfile
    image: jp-api-gateway:dev
    container_name: judicialpredict_api_gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ml-inference-svc:
        condition: service_started
    environment:
      GATEWAY_BIND: "0.0.0.0:4040"
      DATABASE_URL: "postgres://judicialpredict:judicialpredict_dev_pwd@postgres:5432/judicialpredict_dev"
      AUDIT_DATABASE_URL: "postgres://judicialpredict:judicialpredict_dev_pwd@postgres:5432/judicialpredict_dev"
      ML_INFERENCE_URL: "http://ml-inference-svc:8001"
      FEATURE_STORE_GRPC_URL: "http://127.0.0.1:4001"  # in-process; reserved for S5+ split
      JWT_SECRET: "dev-only-NOT-A-REAL-SECRET-1234567890abcdef"
      RUST_LOG: "info"
    ports:
      - "127.0.0.1:4040:4040"
    networks:
      - jp_dev_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4040/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # ml-inference-svc (Python FastAPI)
  # Production equivalent: Kubernetes Deployment (CPU-bound, light memory)
  # ---------------------------------------------------------------------------
  ml-inference-svc:
    build:
      context: python/ml-inference-svc
      dockerfile: Dockerfile
    image: jp-ml-inference-svc:dev
    container_name: judicialpredict_ml_inference
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://judicialpredict:judicialpredict_dev_pwd@postgres:5432/judicialpredict_dev"
      AUDIT_DATABASE_URL: "postgres://judicialpredict:judicialpredict_dev_pwd@postgres:5432/judicialpredict_dev"
      JWT_SECRET: "dev-only-NOT-A-REAL-SECRET-1234567890abcdef"
      JWT_DEV_SECRET: "dev-only-NOT-A-REAL-SECRET-1234567890abcdef"
      FEATURE_STORE_GRPC_URL: "http://127.0.0.1:4001"
      RATE_LIMIT_RPM: "600"
      RATE_LIMIT_GRAPHQL_MUTATIONS_PER_MIN: "600"
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      # Model artefacts trained by python/ml-inference-svc/train_first_models.py.
      # MLflow meta.yaml bakes in absolute artifact_uri paths, so we mount the
      # host directory at BOTH /app/mlruns (for predict.py s project_root lookup)
      # and the absolute path the MLflow run records reference.
      # Sprint-5: replace with MinIO / S3 model registry that uses relative paths.
      - ./python/ml-inference-svc/mlruns:/app/mlruns:ro
      - ./python/ml-inference-svc/mlruns:/opt/ai-elevate/gigforge/projects/judicialpredict/python/ml-inference-svc/mlruns:ro
    networks:
      - jp_dev_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://127.0.0.1:8001/healthz', timeout=2)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # web (Next.js 15 standalone build)
  # Production equivalent: Kubernetes Deployment + CDN-fronted static assets
  # ---------------------------------------------------------------------------
  web:
    build:
      context: web
      dockerfile: Dockerfile
    image: jp-web:dev
    container_name: judicialpredict_web
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
      admin:
        condition: service_started
    environment:
      PORT: "3030"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: "production"
      GATEWAY_INTERNAL_URL: "http://api-gateway:4040"
      DJANGO_AUTH_URL: "http://admin:8000"
      JWT_DEV_SECRET: "dev-only-NOT-A-REAL-SECRET-1234567890abcdef"
    ports:
      - "127.0.0.1:3030:3030"
    networks:
      - jp_dev_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3030/api/health >/dev/null 2>&1 || wget -qO- http://127.0.0.1:3030/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# =============================================================================
# Volumes — all local-dev data persists across restarts.
# Destroy with: docker compose -f docker-compose.dev.yml down -v
# =============================================================================
volumes:
  jp_pg_data:
  jp_neo4j_data:
  jp_neo4j_logs:
  jp_redis_data:
  jp_minio_data:
  jp_admin_static:

# =============================================================================
# Network — isolated bridge; services address each other by container name.
# =============================================================================
networks:
  jp_dev_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.250.0.0/24
